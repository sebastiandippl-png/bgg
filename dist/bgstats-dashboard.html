<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SebundAnnes Boardgame Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <link rel="stylesheet" href="styles.css?v=20260404">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr" defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans min-h-screen p-3 sm:p-4 md:p-6">

    <div class="max-w-6xl mx-auto">
        <!-- Header & Admin Link -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 md:mb-8 bg-gray-800 p-3 sm:p-4 md:p-6 rounded-lg shadow-lg border border-gray-700 gap-4 md:gap-0">
            <div class="flex-1 min-w-0 flex flex-col items-start">
                <img src="sebundanne_logo.png" alt="SebundAnne Logo" class="h-auto w-full max-w-[360px] sm:max-w-[460px] mb-2 object-contain">
            </div>
            <div class="flex flex-row items-center gap-4">
                <a href="https://boardgamegeek.com" target="_blank" rel="noopener noreferrer" class="inline-block rounded-lg border border-gray-700/70 bg-gray-900/40 p-2 hover:border-gray-500 transition" aria-label="Open BoardGameGeek">
                    <img src="bgg.webp" alt="BoardGameGeek" class="w-36 sm:w-44 h-auto object-contain">
                </a>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="hidden md:mb-6 mb-4" id="nav-tabs">
            <div class="md:hidden px-1 sm:px-0 mb-3" id="mobile-nav-shell">
                <button id="mobile-nav-toggle" class="w-full flex items-center justify-between rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-sm text-gray-200">
                    <span>Menu</span>
                    <span class="text-gray-400" aria-hidden="true">☰</span>
                </button>
                <div id="mobile-nav-menu" class="hidden mt-2 rounded-lg border border-gray-700 bg-gray-800 p-2 space-y-1">
                    <button data-tab-id="insights" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Insights</button>
                    <button data-tab-id="plays" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Last Plays</button>
                    <button data-tab-id="onceupon" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Once Upon</button>
                    <button data-tab-id="mostplayed" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Most Played</button>
                    <button data-tab-id="nextplay" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Next!</button>
                    <button data-tab-id="wanttobuy" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">WantTo</button>
                    <button data-tab-id="gamestats" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Game Stats</button>
                    <button data-tab-id="playerstats" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Player Stats</button>
                    <button data-tab-id="admin" class="w-full rounded-md px-3 py-2 text-left text-sm text-gray-300 hover:bg-gray-700">Admin</button>
                </div>
            </div>

            <div class="hidden md:block overflow-x-auto -mx-3 sm:-mx-4 md:-mx-0 px-3 sm:px-4 md:px-0 border-b border-gray-700 scrollbar-thin scrollbar-thumb-gray-600 scrollbar-track-gray-900">
                <div class="flex space-x-2 sm:space-x-4 md:space-x-6 min-w-min">
                    <button data-tab-id="insights" id="tab-insights" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white tab-active font-medium transition active:scale-95">Insights</button>
                    <button data-tab-id="plays" id="tab-plays" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">Last Plays</button>
                    <button data-tab-id="onceupon" id="tab-onceupon" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">OnceUpon</button>
                    <button data-tab-id="mostplayed" id="tab-mostplayed" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">Most Played</button>
                    <button data-tab-id="nextplay" id="tab-nextplay" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">Next!</button>
                    <button data-tab-id="wanttobuy" id="tab-wanttobuy" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">WantTo</button>
                    <button data-tab-id="gamestats" id="tab-gamestats" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">Game Stats</button>
                    <button data-tab-id="playerstats" id="tab-playerstats" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">Player Stats</button>
                    <button data-tab-id="admin" id="tab-admin" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">Admin</button>
                </div>
            </div>
        </div>

        <!-- Loading Animation -->
        <div id="loading-spinner" class="hidden text-center py-12 sm:py-16 md:py-20 text-gray-500 px-4">
            <div class="flex justify-center mb-6">
                <div class="loading-spinner"></div>
            </div>
            <p class="text-sm sm:text-base font-semibold text-gray-300">Loading database...</p>
            <p class="text-xs text-gray-600 mt-2">This may take a moment on mobile networks.</p>
        </div>

        <!-- Initial State Message -->
        <div id="welcome-message" class="text-center py-12 sm:py-16 md:py-20 text-gray-500 px-4">
            <svg class="mx-auto h-10 sm:h-12 text-gray-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
            </svg>
            <p class="text-sm sm:text-base">No database loaded.</p>
            <p class="text-xs text-gray-600 mt-2">Sign in as admin and start the BGG sync to load data.</p>
        </div>

        <!-- Content Containers -->
        <div id="content-insights" class="tab-content hidden bg-gray-800 rounded-lg border border-gray-700 p-3 sm:p-4 md:p-6"></div>
        
        <div id="content-plays" class="tab-content hidden bg-gray-800 rounded-lg border border-gray-700 p-3 sm:p-4 md:p-6">
            <div id="plays-table" class="overflow-x-auto -mx-3 sm:-mx-4 md:-mx-0 px-3 sm:px-4 md:px-0"></div>
        </div>

        <div id="content-onceupon" class="tab-content hidden bg-gray-800 rounded-lg border border-cyan-900/40 p-3 sm:p-4 md:p-6">
            <div id="onceupon-content"></div>
        </div>

        <div id="content-mostplayed" class="tab-content hidden bg-gray-800 rounded-lg border border-fuchsia-900/40 p-3 sm:p-4 md:p-6">
            <div id="mostplayed-content"></div>
        </div>
        
        <div id="content-nextplay" class="tab-content hidden bg-gray-800 rounded-lg border border-emerald-900/40 p-3 sm:p-4 md:p-6">
            <div id="nextplay-content"></div>
        </div>

        <div id="content-wanttobuy" class="tab-content hidden bg-gray-800 rounded-lg border border-amber-900/40 p-3 sm:p-4 md:p-6">
            <div id="wanttobuy-content"></div>
        </div>
        
        <div id="content-gamestats" class="tab-content hidden bg-gray-800 rounded-lg border border-violet-900/40 p-3 sm:p-4 md:p-6">
            <div id="gamestats-content"></div>
        </div>

        <div id="content-playerstats" class="tab-content hidden bg-gray-800 rounded-lg border border-sky-900/40 p-3 sm:p-4 md:p-6">
            <div id="playerstats-content"></div>
        </div>
        <div id="content-admin" class="tab-content hidden bg-gray-800 rounded-lg border border-red-900/40 p-3 sm:p-4 md:p-6">
            <div class="flex flex-col items-center justify-center min-h-[120px] gap-4">
                <div id="google-login-shell" class="w-full max-w-xs mx-auto">
                    <div id="google-login-area" class="google-login-area"></div>
                </div>
                <div id="admin-controls-shell" class="hidden w-full flex flex-col gap-4">
                    <div class="w-full max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="rounded-lg border border-sky-900/40 bg-gray-900/40 p-4">
                            <h3 class="text-sm sm:text-base font-semibold text-sky-300 mb-3">Full Sync</h3>
                            <div class="flex flex-col gap-2">
                                <button id="admin-sync-games-btn" class="hidden w-full px-3 sm:px-4 py-2 sm:py-2 bg-sky-600 hover:bg-sky-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">Get Games</button>
                                <button id="admin-sync-metadata-btn" class="hidden w-full px-3 sm:px-4 py-2 sm:py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">Get Game Metadata</button>
                                <button id="admin-sync-plays-btn" class="hidden w-full px-3 sm:px-4 py-2 sm:py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">Get Plays + Build DB</button>
                            </div>
                        </div>
                        <div class="rounded-lg border border-violet-900/40 bg-gray-900/40 p-4">
                            <h3 class="text-sm sm:text-base font-semibold text-violet-300 mb-3">Delta Sync</h3>
                            <div class="flex flex-col gap-2">
                                <button id="admin-sync-new-games-btn" class="hidden w-full px-3 sm:px-4 py-2 sm:py-2 bg-purple-600 hover:bg-purple-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">Get New Games</button>
                                <button id="admin-sync-metadata-delta-btn" class="hidden w-full px-3 sm:px-4 py-2 sm:py-2 bg-violet-600 hover:bg-violet-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">Game Metadata Delta Sync</button>
                                <button id="admin-sync-last-plays-btn" class="hidden w-full px-3 sm:px-4 py-2 sm:py-2 bg-cyan-600 hover:bg-cyan-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">Get Last Plays</button>
                            </div>
                        </div>
                    </div>
                    <div class="w-full max-w-md mx-auto">
                        <button id="admin-logout-btn" class="hidden w-full px-3 sm:px-4 py-2 sm:py-2 bg-gray-600 hover:bg-gray-500 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">Logout</button>
                    </div>
                    <div id="sync-progress-shell" class="hidden rounded-lg border border-teal-500/20 bg-teal-500/5 px-3 py-3 w-full max-w-3xl mx-auto">
                        <div class="flex items-start justify-between gap-3">
                            <div class="min-w-0">
                                <div id="sync-progress-label" class="text-xs font-semibold uppercase tracking-[0.18em] text-teal-300">BGG Sync</div>
                                <div id="sync-progress-subtext" class="mt-1 text-[11px] leading-5 text-teal-100/80"></div>
                            </div>
                            <div id="sync-progress-percent" class="shrink-0 text-xs font-semibold text-teal-200">0%</div>
                        </div>
                        <div class="mt-3 h-2 overflow-hidden rounded-full bg-gray-900/70 ring-1 ring-inset ring-white/5">
                            <div id="sync-progress-bar" class="h-full w-0 rounded-full bg-gradient-to-r from-teal-400 via-cyan-400 to-blue-500 transition-all duration-500 ease-out"></div>
                        </div>
                    </div>
                    <div class="w-full max-w-3xl mx-auto mt-2">
                        <h3 class="text-sm sm:text-base font-semibold text-gray-300 mb-2">Sync History</h3>
                        <div id="sync-log-shell" class="rounded-lg border border-gray-700/60 bg-gray-900/40 overflow-x-auto">
                            <table class="w-full text-xs text-left">
                                <thead>
                                    <tr class="border-b border-gray-700/60">
                                        <th class="px-3 py-2 font-semibold text-gray-400 whitespace-nowrap">Type</th>
                                        <th class="px-3 py-2 font-semibold text-gray-400 whitespace-nowrap">Started</th>
                                        <th class="px-3 py-2 font-semibold text-gray-400 whitespace-nowrap">Finished</th>
                                        <th class="px-3 py-2 font-semibold text-gray-400 whitespace-nowrap">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="sync-log-body">
                                    <tr><td colspan="4" class="px-3 py-3 text-gray-500 italic">No sync history yet.</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <footer class="mt-6">
            <div class="rounded-lg border border-gray-700/80 bg-gray-900/40 px-3 py-3 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div class="flex flex-col md:flex-row md:items-center gap-1">
                    <div id="db-last-synced" class="text-xs text-gray-400">Last synced: unknown</div>
                    <div id="db-last-change" class="text-xs text-gray-400">No DB loaded.</div>
                </div>
            </div>
        </footer>
        </div>


    
    <script src="js/utils/security.js?v=20260404" defer></script>
    <script src="js/utils/sort.js?v=20260404" defer></script>
    <script src="js/utils/media.js?v=20260404" defer></script>
    <script src="js/app/state.js?v=20260404" defer></script>
    <script src="js/app/data.js?v=20260404" defer></script>
    <script src="js/app/selectors.js?v=20260404" defer></script>
    <script src="js/tabs/insights.js?v=20260404" defer></script>
    <script src="js/tabs/plays.js?v=20260412" defer></script>
    <script src="js/tabs/onceupon.js?v=20260412b" defer></script>
    <script src="js/tabs/mostplayed.js?v=20260404" defer></script>
    <script src="js/tabs/nextplay.js?v=20260412" defer></script>
    <script src="js/tabs/wanttobuy.js?v=20260412" defer></script>
    <script src="js/tabs/gamestats.js?v=20260412b" defer></script>
    <script src="js/tabs/playerstats.js?v=20260412" defer></script>
    <script src="js/app/dashboard.js?v=20260412" defer></script>
    <script src="js/tabs/admin.js?v=20260406" defer></script>
    <script src="script.js?v=20260404" defer></script>
    <script src="js/app/auth-ui.js?v=20260405" defer></script>

    <style>
        * { -webkit-user-select: none; user-select: none; }
        input, textarea, button { -webkit-user-select: text; user-select: text; }
        table { border-collapse: collapse; }
        th, td { padding: 0.5rem; text-align: left; font-size: 0.875rem; }
        @media (min-width: 640px) {
            th, td { padding: 0.75rem; font-size: 0.9375rem; }
        }
        .tab-active { border-bottom: 2px solid #3b82f6 !important; }
        .bg-row-even { background: rgba(107, 114, 128, 0.1); }
        .google-login-area {
            min-height: 40px;
            display: flex;
            justify-content: center;
        }
        .google-login-area,
        .google-login-area > div,
        .google-login-area iframe {
            width: 100%;
        }
        @media (min-width: 768px) {
            .google-login-area,
            .google-login-area > div,
            .google-login-area iframe {
                width: auto;
            }
        }
        .google-login-area iframe {
            border-radius: 9999px;
        }
        
        /* Scrollbar styling for webkit browsers */
        .scrollbar-thin::-webkit-scrollbar { height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.6); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(75, 85, 99, 0.8); }
        
        /* Mobile-optimized button press feedback */
        button { position: relative; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        /* Improved touch targets on mobile */
        @media (max-width: 640px) {
            button, input[type="checkbox"], input[type="file"], a {
                min-height: 2.5rem;
                min-width: 2.5rem;
            }
            input[type="checkbox"] { width: 1.25rem !important; height: 1.25rem !important; }
        }
    </style>
</body>
</html>
