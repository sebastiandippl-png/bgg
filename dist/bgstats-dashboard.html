<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGStats Local Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans min-h-screen p-3 sm:p-4 md:p-6">

    <div class="max-w-6xl mx-auto">
        <!-- Header & Admin Link -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 bg-gray-800 p-3 sm:p-4 md:p-6 rounded-lg shadow-lg border border-gray-700 gap-4 md:gap-0">
            <div class="flex-1 min-w-0">
                <h1 class="text-2xl sm:text-3xl font-bold text-white mb-1 sm:mb-2">SebundAnne's Boardgame Dashboard</h1>
                <p class="text-gray-400 text-xs sm:text-sm">Sleep.Eat.Play.Repeat.</p>
            </div>
            <div class="w-full md:w-auto flex flex-col space-y-2 md:space-y-3">
                <button id="admin-sync-games-btn" class="hidden px-3 sm:px-4 py-2 sm:py-2 bg-sky-600 hover:bg-sky-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">
                    Get Games
                </button>
                <button id="admin-sync-metadata-btn" class="hidden px-3 sm:px-4 py-2 sm:py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">
                    Get Game Metadata
                </button>
                <button id="admin-sync-plays-btn" class="hidden px-3 sm:px-4 py-2 sm:py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">
                    Get Plays + Build DB
                </button>
                <div id="google-login-shell" class="flex justify-center md:justify-stretch rounded-lg border border-gray-700/80 bg-gray-900/40 px-3 py-2">
                    <div id="google-login-area" class="google-login-area"></div>
                </div>
                <button id="admin-logout-btn" class="hidden px-3 sm:px-4 py-2 sm:py-2 bg-gray-600 hover:bg-gray-500 text-white text-xs sm:text-sm font-semibold rounded-md transition text-center active:scale-95">
                    Logout
                </button>
                <div id="sync-progress-shell" class="hidden rounded-lg border border-teal-500/20 bg-teal-500/5 px-3 py-3">
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <div id="sync-progress-label" class="text-xs font-semibold uppercase tracking-[0.18em] text-teal-300">BGG Sync</div>
                            <div id="sync-progress-subtext" class="mt-1 text-[11px] leading-5 text-teal-100/80"></div>
                        </div>
                        <div id="sync-progress-percent" class="shrink-0 text-xs font-semibold text-teal-200">0%</div>
                    </div>
                    <div class="mt-3 h-2 overflow-hidden rounded-full bg-gray-900/70 ring-1 ring-inset ring-white/5">
                        <div id="sync-progress-bar" class="h-full w-0 rounded-full bg-gradient-to-r from-teal-400 via-cyan-400 to-blue-500 transition-all duration-500 ease-out"></div>
                    </div>
                </div>
                <div id="db-last-synced" class="text-xs text-gray-400 text-right md:text-left">Last synced: unknown</div>
                <div id="db-last-change" class="text-xs text-gray-400 text-right md:text-left">No DB loaded.</div>
            </div>
        </div>

        <!-- Navigation Tabs (Mobile Friendly) -->
        <div class="hidden overflow-x-auto -mx-3 sm:-mx-4 md:-mx-0 px-3 sm:px-4 md:px-0 md:mb-6 mb-4 border-b border-gray-700 scrollbar-thin scrollbar-thumb-gray-600 scrollbar-track-gray-900" id="nav-tabs">
            <div class="flex space-x-2 sm:space-x-4 md:space-x-6 min-w-min">
                <button data-tab-id="insights" id="tab-insights" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white tab-active font-medium transition active:scale-95">Insights</button>
                <button data-tab-id="plays" id="tab-plays" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-gray-400 hover:text-white font-medium transition active:scale-95">Last Plays</button>
                <button data-tab-id="nextplay" id="tab-nextplay" class="pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-emerald-400 hover:text-emerald-300 font-medium transition active:scale-95">Next!</button>
                <!-- tab-schema is shown only for admins via auth-ui.js -->
                <button data-tab-id="schema" id="tab-schema" class="hidden pb-2 px-2 sm:px-3 md:px-0 whitespace-nowrap text-xs sm:text-sm text-yellow-400 hover:text-yellow-300 font-medium transition active:scale-95">Schema</button>
            </div>
        </div>

        <!-- Initial State Message -->
        <div id="welcome-message" class="text-center py-12 sm:py-16 md:py-20 text-gray-500 px-4">
            <svg class="mx-auto h-10 sm:h-12 text-gray-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
            </svg>
            <p class="text-sm sm:text-base">No database loaded.</p>
            <p class="text-xs text-gray-600 mt-2">Sign in as admin and start the BGG sync to load data.</p>
        </div>

        <!-- Content Containers -->
        <div id="content-insights" class="tab-content hidden bg-gray-800 rounded-lg border border-gray-700 p-3 sm:p-4 md:p-6"></div>
        
        <div id="content-plays" class="tab-content hidden bg-gray-800 rounded-lg border border-gray-700 p-3 sm:p-4 md:p-6">
            <div id="plays-table" class="overflow-x-auto -mx-3 sm:-mx-4 md:-mx-0 px-3 sm:px-4 md:px-0"></div>
        </div>
        
        <div id="content-nextplay" class="tab-content hidden bg-gray-800 rounded-lg border border-emerald-900/40 p-3 sm:p-4 md:p-6">
            <div id="nextplay-content"></div>
        </div>
        
        <div id="content-schema" class="tab-content hidden bg-gray-800 p-3 sm:p-4 md:p-6 rounded-lg border border-yellow-900/50 text-xs sm:text-sm"></div>
    </div>

    
    <script src="js/utils/security.js" defer></script>
    <script src="js/utils/sort.js" defer></script>
    <script src="js/utils/media.js" defer></script>
    <script src="js/app/state.js" defer></script>
    <script src="js/app/data.js" defer></script>
    <script src="js/app/selectors.js" defer></script>
    <script src="js/tabs/insights.js" defer></script>
    <script src="js/tabs/plays.js" defer></script>
    <script src="js/tabs/nextplay.js" defer></script>
    <script src="js/tabs/schema.js" defer></script>
    <script src="js/app/dashboard.js" defer></script>
    <script src="script.js" defer></script>
    <script src="js/app/auth-ui.js" defer></script>

    <style>
        * { -webkit-user-select: none; user-select: none; }
        input, textarea, button { -webkit-user-select: text; user-select: text; }
        table { border-collapse: collapse; }
        th, td { padding: 0.5rem; text-align: left; font-size: 0.875rem; }
        @media (min-width: 640px) {
            th, td { padding: 0.75rem; font-size: 0.9375rem; }
        }
        .tab-active { border-bottom: 2px solid #3b82f6 !important; }
        .bg-row-even { background: rgba(107, 114, 128, 0.1); }
        .google-login-area {
            min-height: 40px;
            display: flex;
            justify-content: center;
        }
        .google-login-area,
        .google-login-area > div,
        .google-login-area iframe {
            width: 100%;
        }
        @media (min-width: 768px) {
            .google-login-area,
            .google-login-area > div,
            .google-login-area iframe {
                width: auto;
            }
        }
        .google-login-area iframe {
            border-radius: 9999px;
        }
        
        /* Scrollbar styling for webkit browsers */
        .scrollbar-thin::-webkit-scrollbar { height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(75, 85, 99, 0.6); border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(75, 85, 99, 0.8); }
        
        /* Mobile-optimized button press feedback */
        button { position: relative; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        /* Improved touch targets on mobile */
        @media (max-width: 640px) {
            button, input[type="checkbox"], input[type="file"], a {
                min-height: 2.5rem;
                min-width: 2.5rem;
            }
            input[type="checkbox"] { width: 1.25rem !important; height: 1.25rem !important; }
        }
    </style>
</body>
</html>
